<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_LOBBY</title>
    <link rel="stylesheet" href="/static/lobby.css">
</head>
<body>
    <button id="theme-toggle">[ THEME ]</button>

    <div id="lobby-screen" class="container">
        <div class="top-bar">
            <h1>LIVE_LOBBY</h1>
            <div id="status">Connecting...</div>
        </div>

        <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px;">
            <div class="section-label">// ONLINE_PLAYERS</div>
            <div id="users"></div>

            <button id="findMatch" class="btn-block">[ INITIATE_RANDOM_MATCHMAKING ]</button>
            <a href="/static/leaderboard.html" style="text-align:center; color: var(--dark-green); font-family: var(--font-mono); font-size: 1rem; letter-spacing: 2px; text-decoration: none; transition: 0.2s;"
               onmouseover="this.style.color='var(--main-green)'"
               onmouseout="this.style.color='var(--dark-green)'">
                [ VIEW_LEADERBOARD ]
            </a>
        </div>
    </div>

    <!-- Challenge incoming overlay -->
    <div id="challenge-overlay">
        <div class="challenge-box">
            <p>INCOMING CHALLENGE FROM<br><span id="challenger-name">---</span></p>
            <div class="challenge-actions">
                <button id="btn-accept">[ ACCEPT ]</button>
                <button id="btn-decline">[ DECLINE ]</button>
            </div>
        </div>
    </div>

    <script src="/static/lobby.js"></script>
    <script src="/static/theme.js"></script>
</body>
</html>
