<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA_GAME</title>
    <link rel="stylesheet" href="/static/game.css">
</head>
<body>
    <button id="theme-toggle">[ THEME ]</button>

    <div class="game-container">
        <div class="top-bar">
            <h1>ARENA_V1.0</h1>
            <div class="player-info">
                <span>UID: <span id="player-uid">---</span></span>
                <span>SYMBOL: <span id="player-symbol">---</span></span>
                <span>ELO: <span id="player-elo">---</span></span>
            </div>
        </div>

        <div class="game-body">
            <div class="board-side">
                <div id="game-status">WAITING_FOR_CONNECTION...</div>

                <div class="board" id="board">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>

                <div class="board-controls">
                    <button id="btn-clear-log">[ CLEAR_LOG ]</button>
                    <button class="btn-forfeit" id="btn-forfeit">[ FORFEIT ]</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="info-box">
                    <p>ROOM: <span id="room-id">---</span></p>
                    <p>OPPONENT: <span id="opponent-uid">---</span></p>
                </div>

                <div class="terminal-log" id="log-panel">
                    <p>> Initializing...</p>
                </div>

                <div class="chat-section">
                    <div class="chat-label">// COMMS_CHANNEL</div>
                    <div id="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input" placeholder="> type message..." maxlength="120" />
                        <button id="btn-send-chat">SEND</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/game.js"></script>
    <script src="/static/theme.js"></script>
</body>
</html>
